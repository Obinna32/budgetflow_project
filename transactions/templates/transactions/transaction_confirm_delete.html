{% extends "transactions/base.html" %}

{% block content %}
    <h1>Delete Transaction</h1>
    <p>Are you sure you want to delete "<strong>{{transaction.title}}</strong>"?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn" style="background-color: #e74c3c";>Yes, Delete</button>
        <a href= "{% url "transaction_list" %}" style="margin-left: 20px;">Cancel</a>
    </form>
{% endblock  %}
